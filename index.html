<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMP PRO MAX CA</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
margin:0;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
overflow:hidden;
}

.box{
background:rgba(255,255,255,0.2);
padding:35px;
border-radius:20px;
max-width:350px;
width:90%;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
position:relative;
}

h1{
margin-bottom:25px;
}

.buttons{
display:flex;
justify-content:center;
gap:20px;
}

button{
padding:12px 26px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
}

#noBtn{
background:#e74c3c;
color:white;
}

#yesBtn{
background:#2ecc71;
color:black;
position:fixed;
z-index:999;
}

.emoji{
font-size:28px;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="box">

<div class="emoji">📚🔥💯</div>

<h1>Do you want <br>IMP PRO MAX of CA? </h1>

<div class="buttons">

<button id="noBtn" onclick="openSecondPage()">No 🙄</button>

<button id="yesBtn">Yes 🙏</button>

</div>

</div>

<script>

const yesBtn = document.getElementById("yesBtn");

// initial position near the question
yesBtn.style.left = "55%";
yesBtn.style.top = "55%";

function moveButton(){

const maxX = window.innerWidth - yesBtn.offsetWidth;
const maxY = window.innerHeight - yesBtn.offsetHeight;

const x = Math.random() * maxX;
const y = Math.random() * maxY;

yesBtn.style.left = x + "px";
yesBtn.style.top = y + "px";

}

// move when trying to hover or click
yesBtn.addEventListener("mouseover", moveButton);
yesBtn.addEventListener("click", moveButton);

function openSecondPage(){

document.body.innerHTML = `

<div class="box">

<div class="emoji">🧠✨🎓</div>

<h1>I knew it! 😏</h1>

<p>I know you are intelligent.<br>
You don't need any important question.</p>

<div class="emoji">💯📚🚀</div>

</div>

`;

}

</script>

</body>
</html>
